{% extends "admin/base_site.html" %}

{% block content %}
<style>
    .translation-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .translation-table th, .translation-table td { padding: 12px; border: 1px solid var(--border-color, #ccc); vertical-align: top; }
    .translation-table th { background-color: var(--darkened-bg, #f8f8f8); text-align: left; font-weight: bold; }
    .translation-input { 
        width: 100%; box-sizing: border-box; padding: 8px; 
        border: 1px solid var(--border-color, #ccc); border-radius: 4px;
        background: var(--body-bg, #fff); color: var(--body-fg, #333);
        font-family: inherit; resize: vertical;
    }
    .translation-key { font-family: monospace; font-size: 13px; color: var(--link-fg, #447e9b); }
    
    /* Адаптация под темную тему Django */
    @media (prefers-color-scheme: dark) {
        .translation-input { border-color: #555; background: #222; color: #eee; }
    }
</style>

<div id="content-main">
    <p>Редактируйте тексты напрямую. Если поле оставлено пустым, на сайте ничего не отобразится.</p>
    
    <form method="post">
        {% csrf_token %}
        <table class="translation-table">
            <thead>
                <tr>
                    <th style="width: 20%;">Ключ (Блок.Элемент)</th>
                    <th>Русский (ru)</th>
                    <th>English (en)</th>
                    <th>Español (es)</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <td><span class="translation-key">{{ row.key }}</span></td>
                    <td><textarea name="ru_{{ row.key }}" class="translation-input" rows="2">{{ row.ru }}</textarea></td>
                    <td><textarea name="en_{{ row.key }}" class="translation-input" rows="2">{{ row.en }}</textarea></td>
                    <td><textarea name="es_{{ row.key }}" class="translation-input" rows="2">{{ row.es }}</textarea></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        
        <div class="submit-row">
            <input type="submit" value="Сохранить переводы" class="default" name="_save">
        </div>
    </form>
</div>
{% endblock %}
