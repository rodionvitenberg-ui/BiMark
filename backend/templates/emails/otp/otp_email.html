<!DOCTYPE html>
<html lang="ru">
<body>
    <div class="wrapper">
        <table class="main" width="100%" cellpadding="0" cellspacing="0" border="0">
            <tr>
                <td class="header">
                    <img src="{{ logo_url }}" alt="Bimark Logo" class="logo">
                </td>
            </tr>
            <tr>
                <td class="content">
                    <h1 class="title">{{ title }}</h1>
                    <p class="text">{{ message }}</p>
                    <div class="code-box">
                        <p class="code">{{ otp_code }}</p>
                    </div>
                    <p class="text" style="font-size: 14px; margin-bottom: 0;">
                        {{ warning }}
                    </p>
                </td>
            </tr>
            <tr>
                <td class="footer">
                    <p class="footer-text">{{ ignore }}</p>
                    <p class="footer-text" style="margin-top: 8px;">{{ rights }}</p>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
